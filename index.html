<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>xCurrency</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">

    <!-- ================= MAIN SCREEN ================= -->
    <div class="screen active" id="mainScreen">

      <!-- HEADER -->
      <div class="header">
        <span class="back" id="backBtn">←</span>
        <h1>Currency Converter</h1>

        <div class="menu-container">
          <span class="menu-btn" id="menuBtn">⋮</span>

          <div class="menu" id="menu">
            <div class="menu-item" id="updateRates">Update exchange rates</div>
          </div>
        </div>
      </div>

      <!-- MESSAGE -->
      <div class="toast" id="toast">Exchange rates updated</div>

      <!-- CURRENCIES -->
      <div class="currencies">

        <div class="currency selectable">
          <img src="us.png" class="flag">
          <div class="info">
            <span class="code">USD ▼</span>
            <span class="name">United States Dollar $</span>
          </div>
          <div class="value main" id="usdValue">1</div>
        </div>

        <div class="currency selectable">
          <img src="eu.png" class="flag">
          <div class="info">
            <span class="code">EUR ▼</span>
            <span class="name">Euro €</span>
          </div>
          <div class="value" id="eurValue">0.8494</div>
        </div>

        <div class="currency selectable">
          <img src="ke.png" class="flag">
          <div class="info">
            <span class="code">KES ▼</span>
            <span class="name">Kenyan Shilling Ksh</span>
          </div>
          <div class="value" id="kesValue">129.0914</div>
        </div>

      </div>

      <!-- UPDATE TIME -->
      <div class="update" id="updateTime">
        xCurrency • Last updated: 04/18/2026 17:10
      </div>

      <!-- KEYPAD -->
      <div class="keypad">

        <div class="keys">
          <button>7</button>
          <button>8</button>
          <button>9</button>

          <button>4</button>
          <button>5</button>
          <button>6</button>

          <button>1</button>
          <button>2</button>
          <button>3</button>

          <button>00</button>
          <button>0</button>
          <button>.</button>
          </div>

        <div class="side">
          <button class="ac">AC</button>
          <button class="backspace">⌫</button>
        </div>

      </div>

    </div>


  <!-- ================= CHANGE CURRENCY SCREEN ================= -->
    <div class="screen" id="currencyScreen">

      <div class="header">
        <span class="back" id="backToMain">←</span>
        <h1>Change Currency</h1>
        <span class="icon">🔍</span>
        <span class="icon">📍</span>
      </div>

      <div class="currency-list">

        <div class="currency-item active">
          <img src="us.png">
          <span>United States Dollar USD</span>
          <span class="check">✓</span>
        </div>

        <div class="currency-item">
          <img src="eu.png">
          <span>Euro EUR</span>
        </div>

        <div class="currency-item">
          <img src="ke.png">
          <span>Kenyan Shilling KES</span>
        </div>

        <!-- Add more currencies later -->

      </div>

    </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
